<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>nlp-lib</title>
</head>
<body style="background: transparent !important; background-color: rgba(0,0,0,0) !important; margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh;">
    
    <div id="textui-container">
        <div id="textui-content" class="textui-box info">
            <div class="icon" id="textui-icon"></div>
            <div class="text" id="textui-text"></div>
        </div>
    </div>

    <div id="progress-container">
        <div id="progress-text"></div>
        <div id="progress-bg">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div id="notifications-container"></div>

    <script src="script.js"></script>
</body>
</html>
